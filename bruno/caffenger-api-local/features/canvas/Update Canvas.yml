info:
  name: Update Canvas
  type: http
  seq: 2

http:
  method: POST
  url: http://localhost:4000/canvas/{{floorId}}/{{canvasId}}
  body:
    type: json
    data: |-
      {
        "width": 20,
        "height": 15
      }
  auth:
    type: bearer
    token: { { authToken } }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
